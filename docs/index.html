<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Screener Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .last-update {
            color: #94a3b8;
            font-size: 0.9em;
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
        }
        
        .card h3 {
            color: #cbd5e1;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        
        .card-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #10b981;
        }
        
        .card-subtitle {
            color: #64748b;
            font-size: 0.85em;
            margin-top: 8px;
        }
        
        .section {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid #334155;
        }
        
        .section h2 {
            color: #f1f5f9;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #0f172a;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #cbd5e1;
            border-bottom: 2px solid #334155;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #334155;
        }
        
        tr:hover {
            background: #334155;
        }
        
        .ticker {
            font-weight: bold;
            color: #60a5fa;
            font-size: 1.1em;
        }
        
        .positive {
            color: #10b981;
        }
        
        .negative {
            color: #ef4444;
        }
        
        .rs-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
        }
        
        .rs-95 { background: #10b981; color: white; }
        .rs-85 { background: #3b82f6; color: white; }
        .rs-75 { background: #f59e0b; color: white; }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .card-value {
                font-size: 2em;
            }
            
            table {
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 Stock Screener Dashboard</h1>
            <div class="last-update" id="lastUpdate">Loading...</div>
        </header>
        
        <div class="summary-cards" id="summaryCards">
            <div class="card">
                <h3>Structure Signals</h3>
                <div class="card-value" id="structureSignals">-</div>
                <div class="card-subtitle" id="structureScanned">-</div>
            </div>
            
            <div class="card">
                <h3>Minervini 7/8+</h3>
                <div class="card-value" id="minervini7Plus">-</div>
                <div class="card-subtitle" id="minerviniScanned">-</div>
            </div>
            
            <div class="card">
                <h3>Minervini 8/8</h3>
                <div class="card-value" id="minervini8">-</div>
                <div class="card-subtitle">Perfect score</div>
            </div>
        </div>
        
        <div class="section">
            <h2>🎯 Structure Break Signals</h2>
            <div id="structureTable">
                <div class="loading">Loading...</div>
            </div>
        </div>
        
        <div class="section">
            <h2>⭐ Top Minervini Candidates</h2>
            <div id="minerviniTable">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>
    
    <script>
        async function loadData() {
            // Load summary
            try {
                const summary = await fetch('data/summary.json').then(r => r.json());
                const updateDate = new Date(summary.last_update);
                document.getElementById('lastUpdate').textContent = 
                    `Last updated: ${updateDate.toLocaleString()}`;
                document.getElementById('structureSignals').textContent = summary.structure.signals;
                document.getElementById('structureScanned').textContent = `${summary.structure.scanned} tickers scanned`;
                document.getElementById('minervini7Plus').textContent = summary.minervini.candidates_7_plus;
                document.getElementById('minerviniScanned').textContent = `${summary.minervini.scanned} tickers scanned`;
                document.getElementById('minervini8').textContent = summary.minervini.candidates_all_8;
            } catch (error) {
                console.error('Error loading summary:', error);
                document.getElementById('lastUpdate').textContent = 'Error loading summary';
            }

            // Load structure signals
            try {
                const structure = await fetch('data/structure_latest.json').then(r => r.json());
                renderStructureTable(structure.signals);
            } catch (error) {
                console.error('Error loading structure data:', error);
                document.getElementById('structureTable').innerHTML = '<div class="no-data">No data available</div>';
            }

            // Load Minervini candidates
            try {
                const minervini = await fetch('data/minervini_latest.json').then(r => r.json());
                renderMinerviniTable(minervini.top_candidates);
            } catch (error) {
                console.error('Error loading Minervini data:', error);
                document.getElementById('minerviniTable').innerHTML = '<div class="no-data">No data available</div>';
            }
        }
        
        function renderStructureTable(signals) {
            const container = document.getElementById('structureTable');
            
            if (signals.length === 0) {
                container.innerHTML = '<div class="no-data">No signals found</div>';
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Ticker</th>
                            <th>Price</th>
                            <th>SMMA 15</th>
                            <th>SMMA 29</th>
                            <th>RSI</th>
                            <th>Volume</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            signals.forEach(signal => {
                html += `
                    <tr>
                        <td class="ticker">${signal.ticker}</td>
                        <td>$${signal.price.toFixed(2)}</td>
                        <td>${signal.smma15.toFixed(2)}</td>
                        <td>${signal.smma29.toFixed(2)}</td>
                        <td>${signal.rsi.toFixed(1)}</td>
                        <td>${signal.volume_surge ? '🔥' : '-'}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function renderMinerviniTable(candidates) {
            const container = document.getElementById('minerviniTable');
            
            if (candidates.length === 0) {
                container.innerHTML = '<div class="no-data">No candidates found</div>';
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Ticker</th>
                            <th>Price</th>
                            <th>% from High</th>
                            <th>RS Rating</th>
                            <th>1Y Return</th>
                            <th>Criteria</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            candidates.forEach(candidate => {
                const rsClass = candidate.rs_rating >= 90 ? 'rs-95' : 
                               candidate.rs_rating >= 80 ? 'rs-85' : 'rs-75';
                const pctClass = candidate.pct_from_high >= -5 ? 'positive' : '';
                
                html += `
                    <tr>
                        <td class="ticker">${candidate.ticker}</td>
                        <td>$${candidate.price.toFixed(2)}</td>
                        <td class="${pctClass}">${candidate.pct_from_high.toFixed(1)}%</td>
                        <td><span class="rs-badge ${rsClass}">${candidate.rs_rating}</span></td>
                        <td class="positive">+${candidate.stock_return_1y.toFixed(1)}%</td>
                        <td>${candidate.criteria_passed}/8 ${candidate.all_criteria_met ? '✅' : ''}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        // Load data on page load
        loadData();
        
        // Refresh every 5 minutes
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
