<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Screener Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .last-update {
            color: #94a3b8;
            font-size: 0.9em;
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
        }
        
        .card h3 {
            color: #cbd5e1;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        
        .card-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #10b981;
        }
        
        .card-subtitle {
            color: #64748b;
            font-size: 0.85em;
            margin-top: 8px;
        }
        
        .section {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid #334155;
        }
        
        .section h2 {
            color: #f1f5f9;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #0f172a;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #cbd5e1;
            border-bottom: 2px solid #334155;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #334155;
        }
        
        tr:hover {
            background: #334155;
        }
        
        .ticker {
            font-weight: bold;
            font-size: 1.1em;
        }
        .ticker a {
            color: #60a5fa;
            text-decoration: none;
        }
        .ticker a:hover {
            color: #93c5fd;
            text-decoration: underline;
        }
        
        .positive {
            color: #10b981;
        }
        
        .negative {
            color: #ef4444;
        }
        
        .rs-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
        }
        
        .rs-95 { background: #10b981; color: white; }
        .rs-85 { background: #3b82f6; color: white; }
        .rs-75 { background: #f59e0b; color: white; }
        
        /* Watchlist status badges */
        .status-entry    { background: #10b981; color: white; }
        .status-exit     { background: #ef4444; color: white; }
        .status-caution  { background: #f97316; color: white; }
        .status-climactic{ background: #a855f7; color: white; }
        .status-extended { background: #f59e0b; color: #1e293b; }
        .status-hold     { background: #475569; color: #cbd5e1; }
        .status-nodata   { background: transparent; color: #64748b; }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .card-value {
                font-size: 2em;
            }
            
            table {
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 Stock Screener Dashboard</h1>
            <div class="last-update" id="lastUpdate">Loading...</div>
        </header>
        
        <div class="summary-cards" id="summaryCards">
            <div class="card">
                <h3>Structure Signals</h3>
                <div class="card-value" id="structureSignals">-</div>
                <div class="card-subtitle" id="structureScanned">-</div>
            </div>
            
            <div class="card">
                <h3>Minervini 7/8+</h3>
                <div class="card-value" id="minervini7Plus">-</div>
                <div class="card-subtitle" id="minerviniScanned">-</div>
            </div>
            
            <div class="card">
                <h3>Minervini 8/8</h3>
                <div class="card-value" id="minervini8">-</div>
                <div class="card-subtitle">Perfect score</div>
            </div>
        </div>
        
        <div class="section" id="watchlistSection">
            <h2>👀 Personal Watchlist</h2>
            <div id="watchlistTable">
                <div class="loading">Loading...</div>
            </div>
        </div>

        <div class="section">
            <h2>🚨 Exit & Take-Profit Alerts</h2>
            <div id="exitTable">
                <div class="loading">Loading...</div>
            </div>
        </div>

        <div class="section">
            <h2>📈 SMMA Crossover Signals</h2>
            <div id="structureTable">
                <div class="loading">Loading...</div>
            </div>
        </div>
        
        <div class="section">
            <h2>⭐ Top Minervini Candidates</h2>
            <div id="minerviniTable">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>
    
    <script>
        async function loadData() {
            try {
                // Load summary
                const [summary, exitData] = await Promise.all([
                    fetch('data/summary.json').then(r => r.json()),
                    fetch('data/exit_alerts.json').then(r => r.json()).catch(() => null),
                ]);
                renderExitTable(exitData);
                
                // Update last update time
                const updateDate = new Date(summary.last_update);
                document.getElementById('lastUpdate').textContent = 
                    `Last updated: ${updateDate.toLocaleString()}`;
                
                // Update summary cards
                document.getElementById('structureSignals').textContent = 
                    summary.structure.signals;
                document.getElementById('structureScanned').textContent = 
                    `${summary.structure.scanned} tickers scanned`;
                
                document.getElementById('minervini7Plus').textContent = 
                    summary.minervini.candidates_7_plus;
                document.getElementById('minerviniScanned').textContent = 
                    `${summary.minervini.scanned} tickers scanned`;
                
                document.getElementById('minervini8').textContent = 
                    summary.minervini.candidates_all_8;
                
                // Load watchlist summary
                const watchlist = await fetch('data/watchlist_summary.json').then(r => r.json()).catch(() => null);
                renderWatchlistTable(watchlist);

                // Load structure signals
                const structure = await fetch('data/structure_latest.json').then(r => r.json());
                renderStructureTable(structure.signals);
                
                // Load Minervini candidates
                const minervini = await fetch('data/minervini_latest.json').then(r => r.json());
                renderMinerviniTable(minervini.top_candidates);
                
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('lastUpdate').textContent = 'Error loading data';
            }
        }
        
        // ── Composite score helpers ─────────────────────────────────────────

        // Convert yfinance ticker to TradingView URL
        // Crypto: BTC-USD → BTCUSD, stocks: AAPL → AAPL
        function tvUrl(ticker) {
            const tv = ticker.replace(/-USD$/, 'USD').replace(/-/, '');
            return `https://www.tradingview.com/chart/?symbol=${encodeURIComponent(tv)}`;
        }

        function calcStructureScore(signal) {
            // RSI component (50-80 sweet spot → up to 50 pts)
            const rsi = signal.rsi || 0;
            const rsiScore = Math.min(Math.max((rsi - 50) / 20 * 50, 0), 50);

            // SMMA spread: (smma15-smma29)/smma29 * 100 → cap 5% spread = 30 pts
            const smmaGap = ((signal.smma15 - signal.smma29) / signal.smma29) * 100;
            const smmaScore = Math.min(Math.max(smmaGap / 5 * 30, 0), 30);

            // Volume surge bonus: 20 pts
            const volScore = signal.volume_surge ? 20 : 0;

            return Math.round(rsiScore + smmaScore + volScore);
        }

        function calcMinerviniScore(candidate) {
            const criteriaScore = (candidate.criteria_passed / 8) * 40;
            const rsScore       = (candidate.rs_rating / 100) * 35;
            const proxScore     = Math.max((25 + candidate.pct_from_high) / 25 * 15, 0);
            const returnScore   = Math.min(candidate.stock_return_1y / 200, 1) * 10;
            return Math.round(criteriaScore + rsScore + proxScore + returnScore);
        }

        // Rank tiers — lowered so top 7/8 candidates always reach gold
        function calcMinerviniRank(composite) {
            if (composite >= 84) return 1; // 🥇 Gold
            if (composite >= 79) return 2; // 🥈 Silver
            if (composite >= 74) return 3; // 🥉 Bronze
            if (composite >= 68) return 4;
            return 5;
        }
        const rankLabel = ['','🥇','🥈','🥉','4','5'];

        // ── Column sorting ───────────────────────────────────────────────────
        let _sortState = {};
        function makeSortable(tableEl) {
            const headers = tableEl.querySelectorAll('thead th');
            headers.forEach((th, colIdx) => {
                th.style.cursor = 'pointer';
                th.title = 'Click to sort';
                th.addEventListener('click', () => {
                    const key = tableEl.id + '_' + colIdx;
                    const asc = _sortState[key] !== true;
                    _sortState[key] = asc;
                    headers.forEach(h => h.textContent = h.textContent.replace(/ [▲▼]$/, ''));
                    th.textContent += asc ? ' ▲' : ' ▼';
                    const tbody = tableEl.querySelector('tbody');
                    const rows = Array.from(tbody.querySelectorAll('tr'));
                    rows.sort((a, b) => {
                        const aVal = a.cells[colIdx]?.textContent.trim().replace(/[$%+,🥇🥈🥉✅]/g,'') || '';
                        const bVal = b.cells[colIdx]?.textContent.trim().replace(/[$%+,🥇🥈🥉✅]/g,'') || '';
                        const aNum = parseFloat(aVal), bNum = parseFloat(bVal);
                        if (!isNaN(aNum) && !isNaN(bNum)) return asc ? aNum - bNum : bNum - aNum;
                        return asc ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
                    });
                    rows.forEach(r => tbody.appendChild(r));
                });
            });
        }

        // ── Table renderers ─────────────────────────────────────────────────

        function renderWatchlistTable(watchlistData) {
            const container = document.getElementById('watchlistTable');
            if (!watchlistData || !watchlistData.tickers || watchlistData.tickers.length === 0) {
                container.innerHTML = '<div class="no-data">No watchlist data available</div>';
                return;
            }

            const tickers = watchlistData.tickers;
            const scanDate = watchlistData.scan_date ? new Date(watchlistData.scan_date).toLocaleString() : '—';

            function statusBadge(status) {
                switch (status) {
                    case 'ENTRY':          return `<span class="rs-badge status-entry">🟢 ENTRY</span>`;
                    case 'EXIT_STRONG':    return `<span class="rs-badge status-exit">🔴 EXIT SELL</span>`;
                    case 'EXIT_WEAK':      return `<span class="rs-badge status-caution">🔴 EXIT CAUTION</span>`;
                    case 'CLIMACTIC_SELL': return `<span class="rs-badge status-climactic">🚀 CLIMACTIC</span>`;
                    case 'EXTENDED':       return `<span class="rs-badge status-extended">⚠️ EXTENDED</span>`;
                    case 'HOLD':           return `<span style="color:#94a3b8">⏳ HOLD</span>`;
                    case 'NO_DATA':        return `<span style="color:#64748b">—</span>`;
                    default:               return `<span style="color:#94a3b8">${status}</span>`;
                }
            }

            function scoreBadge(score, status) {
                if (status === 'NO_DATA' || score === 0) return '—';
                const cls = score >= 85 ? 'rs-95' : score >= 75 ? 'rs-85' : 'rs-75';
                return `<span class="rs-badge ${cls}">${score}</span>`;
            }

            function rsBadge(rs, status) {
                if (status === 'NO_DATA' || rs === 0) return '—';
                const cls = rs >= 85 ? 'rs-95' : rs >= 75 ? 'rs-85' : 'rs-75';
                return `<span class="rs-badge ${cls}">${rs}</span>`;
            }

            let html = `
                <table id="watchlistTableEl">
                    <thead><tr>
                        <th>Ticker</th>
                        <th>Name</th>
                        <th>Score</th>
                        <th>Criteria</th>
                        <th>Status</th>
                        <th>Price</th>
                        <th>% from High</th>
                        <th>RS</th>
                    </tr></thead><tbody>`;

            tickers.forEach(t => {
                const tvLink = `<a href="${tvUrl(t.display)}" target="_blank" rel="noopener">${t.display}</a>`;
                const pctClass = (t.pct_from_high >= -5 && t.status !== 'NO_DATA') ? 'positive' :
                                 (t.pct_from_high < -15 && t.status !== 'NO_DATA') ? 'negative' : '';
                const priceStr = t.status === 'NO_DATA' || t.price === 0 ? '—' :
                                 t.price >= 1000 ? `$${t.price.toFixed(0)}` :
                                 t.price >= 1 ? `$${t.price.toFixed(2)}` : `$${t.price.toFixed(4)}`;
                const pctStr = t.status === 'NO_DATA' ? '—' : `${t.pct_from_high > 0 ? '+' : ''}${t.pct_from_high.toFixed(1)}%`;
                const criteriaStr = t.status === 'NO_DATA' ? '—' : `${t.criteria_passed}/8`;

                html += `<tr>
                    <td class="ticker">${tvLink}</td>
                    <td style="color:#cbd5e1">${t.name}</td>
                    <td>${scoreBadge(t.score, t.status)}</td>
                    <td>${criteriaStr}</td>
                    <td>${statusBadge(t.status)}</td>
                    <td>${priceStr}</td>
                    <td class="${pctClass}">${pctStr}</td>
                    <td>${rsBadge(t.rs_rating, t.status)}</td>
                </tr>`;
            });

            html += `</tbody></table>
                <div style="font-size:0.8em;color:#94a3b8;margin-top:6px">Watchlist scan: ${scanDate}</div>`;
            container.innerHTML = html;
            makeSortable(document.getElementById('watchlistTableEl'));
        }

        function renderExitTable(exitData) {
            const container = document.getElementById('exitTable');
            if (!exitData) { container.innerHTML = '<div class="no-data">No data</div>'; return; }

            const strong    = exitData.strong_exits        || [];
            const weak      = exitData.weak_exits          || [];
            const climactic = exitData.climactic_sells     || [];
            const partial   = exitData.partial_profits     || [];
            const extended  = exitData.extended_watch      || [];
            const watchSize = exitData.watchlist_size      || 0;

            const allAlerts = [
                ...climactic.map(r => ({ ...r, _type: '🚀 Climactic sell',  _cls: 'rs-95' })),
                ...strong.map(r    => ({ ...r, _type: '🔴 Sell (MA50 break)', _cls: 'rs-95' })),
                ...partial.map(r   => ({ ...r, _type: '💰 Take partial',    _cls: 'rs-85' })),
                ...weak.map(r      => ({ ...r, _type: '🟡 Caution',         _cls: 'rs-75' })),
                ...extended.map(r  => ({ ...r, _type: '⚠️ Extended',        _cls: 'rs-75' })),
            ];

            if (allAlerts.length === 0) {
                container.innerHTML = `<div class="no-data">✅ All ${watchSize} watchlist positions are healthy — no alerts today</div>`;
                return;
            }

            let html = `
                <table id="exitTableEl">
                    <thead><tr>
                        <th>Signal</th>
                        <th>Ticker</th>
                        <th>Price</th>
                        <th>vs MA50</th>
                        <th>P&amp;L</th>
                        <th>Vol Ratio</th>
                        <th>Added</th>
                    </tr></thead><tbody>`;

            allAlerts.forEach(r => {
                const pnl  = r.gain_pct != null ? `${r.gain_pct > 0 ? '+' : ''}${r.gain_pct.toFixed(1)}%` :
                             r.pnl_pct  != null ? `${r.pnl_pct  > 0 ? '+' : ''}${r.pnl_pct.toFixed(1)}%`  : '—';
                const ma50 = r.pct_vs_ma50    != null ? `${r.pct_vs_ma50.toFixed(1)}%`    :
                             r.pct_above_ma50 != null ? `+${r.pct_above_ma50.toFixed(1)}%` : '—';
                const vol  = r.vol_ratio != null ? `${r.vol_ratio}x` : '—';
                const tvLink = `<a href="${tvUrl(r.ticker)}" target="_blank" rel="noopener">${r.ticker}</a>`;
                html += `<tr>
                    <td><span class="rs-badge ${r._cls}">${r._type}</span></td>
                    <td class="ticker">${tvLink}</td>
                    <td>$${r.current_price != null ? r.current_price.toFixed(2) : '—'}</td>
                    <td>${ma50}</td>
                    <td>${pnl}</td>
                    <td>${vol}</td>
                    <td>${r.date_added || '—'}</td>
                </tr>`;
            });

            html += `</tbody></table><div style="font-size:0.8em;color:#94a3b8;margin-top:6px">Watchlist: ${watchSize} active positions</div>`;
            container.innerHTML = html;
            makeSortable(document.getElementById('exitTableEl'));
        }

        function renderStructureTable(signals) {
            const container = document.getElementById('structureTable');
            
            if (!signals || signals.length === 0) {
                container.innerHTML = '<div class="no-data">No signals found</div>';
                return;
            }

            // Add composite score and sort best → worst
            const scored = signals.map(s => ({ ...s, composite: calcStructureScore(s) }));
            scored.sort((a, b) => b.composite - a.composite);
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Ticker</th>
                            <th>Price</th>
                            <th>SMMA 15</th>
                            <th>SMMA 29</th>
                            <th>RSI</th>
                            <th>Volume</th>
                            <th>Score ▾</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            scored.forEach(signal => {
                html += `
                    <tr>
                        <td class="ticker"><a href="${tvUrl(signal.ticker)}" target="_blank" rel="noopener">${signal.ticker}</a></td>
                        <td>$${signal.price.toFixed(2)}</td>
                        <td>${signal.smma15.toFixed(2)}</td>
                        <td>${signal.smma29.toFixed(2)}</td>
                        <td>${signal.rsi.toFixed(1)}</td>
                        <td>${signal.volume_surge ? '🔥' : '-'}</td>
                        <td><span class="rs-badge rs-85">${signal.composite}</span></td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
            makeSortable(container.querySelector('table'));
        }
        
        function renderMinerviniTable(candidates) {
            const container = document.getElementById('minerviniTable');
            
            if (!candidates || candidates.length === 0) {
                container.innerHTML = '<div class="no-data">No candidates found</div>';
                return;
            }

            // Add composite + rank, sort by rank then score
            const scored = candidates
                .map(c => ({ ...c, composite: calcMinerviniScore(c) }))
                .map(c => ({ ...c, rank: calcMinerviniRank(c.composite) }))
                .sort((a, b) => {
                    if (a.rank !== b.rank) return a.rank - b.rank;          // rank group first
                    if (b.rs_rating !== a.rs_rating) return b.rs_rating - a.rs_rating; // then RS Rating ↓
                    return b.pct_from_high - a.pct_from_high;               // then closest to 52w high ↑
                });
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Score</th>
                            <th>Ticker</th>
                            <th>Price</th>
                            <th>% from High</th>
                            <th>RS Rating</th>
                            <th>1Y Return</th>
                            <th>Criteria</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            scored.forEach(candidate => {
                const rsClass    = candidate.rs_rating >= 90 ? 'rs-95' :
                                   candidate.rs_rating >= 80 ? 'rs-85' : 'rs-75';
                const pctClass   = candidate.pct_from_high >= -5 ? 'positive' : '';
                const scoreClass = (candidate.composite >= 85 && candidate.composite <= 89) ? 'rs-95' :
                                    candidate.composite >= 80 ? 'rs-85' : 'rs-75';
                const rl = rankLabel[candidate.rank] || candidate.rank;
                
                html += `
                    <tr>
                        <td style="text-align:center;font-size:1.1em">${rl}</td>
                        <td><span class="rs-badge ${scoreClass}">${candidate.composite}</span></td>
                        <td class="ticker"><a href="${tvUrl(candidate.ticker)}" target="_blank" rel="noopener">${candidate.ticker}</a></td>
                        <td>$${candidate.price.toFixed(2)}</td>
                        <td class="${pctClass}">${candidate.pct_from_high.toFixed(1)}%</td>
                        <td><span class="rs-badge ${rsClass}">${candidate.rs_rating}</span></td>
                        <td class="positive">+${candidate.stock_return_1y.toFixed(1)}%</td>
                        <td>${candidate.criteria_passed}/8 ${candidate.all_criteria_met ? '✅' : ''}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
            makeSortable(container.querySelector('table'));
        }
        
        // Load data on page load
        loadData();
        
        // Refresh every 5 minutes
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
