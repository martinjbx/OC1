name: Daily Stock Screener

on:
  schedule:
    # 21:45 UTC = 10:45pm BST (summer) / 9:45pm GMT (winter) — after US & UK market close
    - cron: '45 21 * * 1-5'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: screener/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r screener/requirements.txt
          pip install requests  # for send_telegram_report.py

      - name: Run screeners
        run: python screener/run_daily_json.py

      - name: Send Telegram report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python screener/send_telegram_report.py

      - name: Commit updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screener/dashboard/data/
          git diff --cached --quiet || git commit -m "📊 Daily screener results $(date -u '+%Y-%m-%d')"
          git push
