name: Daily Stock Screener

on:
  schedule:
    # Run at 21:45 UTC = 10:45pm BST (summer) / 9:45pm GMT (winter) — after US & UK market close
    - cron: '45 21 * * 1-5'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  run-screeners:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd screener
          pip install -r requirements.txt
      
      - name: Run daily screeners
        run: |
          cd screener
          python run_daily_json.py
          # Copy JSON output and dashboard HTML to docs/ for GitHub Pages
          cp dashboard/data/*.json ../docs/data/
          cp dashboard/index.html ../docs/index.html
      
      - name: Commit and push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/data/*.json screener/dashboard/data/*.json
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "📊 Daily screener results - $(date +'%Y-%m-%d')" && \
             git pull --rebase origin main && \
             git push)

      - name: Send Telegram report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd screener
          python send_telegram_report.py
