name: Daily Stock Screener

on:
  schedule:
    # Run at 9:00 AM UTC (after market open) every weekday
    - cron: '0 9 * * 1-5'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  run-screeners:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd screener
          pip install -r requirements.txt
      
      - name: Run daily screeners
        run: |
          cd screener
          python run_daily_json.py
          # Copy JSON output to docs/data for GitHub Pages
          cp dashboard/data/*.json ../docs/data/
      
      - name: Commit and push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/data/*.json
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "📊 Daily screener results - $(date +'%Y-%m-%d')" && git push)
